# Copied from https://github.com/hendrikmi/dotfiles/blob/main/tmux/onedark-theme.conf
bg="#2c323c"
# --- Status line ---
default_fg="#abb2bf"
session_fg="#98c379"
selection_bg="#98c379"
selection_fg="#282c34"
active_pane_border="#abb2bf"
active_window_fg="#61afef"

# # Nord
# bg="#3B4252"
# default_fg="#d8dee9"
# session_fg="#A3BE8C"
# selection_bg="#A3BE8C"
# selection_fg="#3B4252"
# active_pane_border="#abb2bf"
# active_window_fg="#81A1C1"

set -g status-position top
set -g status-left "#[fg=${session_fg},bold,bg=${bg}] #S"
set -g status-right "#[fg=${default_fg},bg=${bg}]"
set -g status-justify left
set -g status-left-length 200  # default: 10
set -g status-right-length 200 # default: 10
set-option -g status-style bg=${bg}
set -g window-status-current-format "#[fg=${active_window_fg},bg=default] #I:#W"
set -g window-status-format "#[fg=${default_fg},bg=default] #I:#W"
set -g window-status-last-style "fg=${default_fg},bg=default"
set -g message-command-style bg=default,fg=${default_fg}
set -g message-style bg=default,fg=${default_fg}
set -g mode-style bg=${selection_bg},fg=${selection_fg}
set -g pane-active-border-style "fg=${active_pane_border},bg=default"
set -g pane-border-style 'fg=brightblack,bg=default'

##########################################################################

# From ChatGPT

# --- Prefix ---
unbind C-b              # Unbind default prefix
set -g prefix C-a       # Set prefix to Ctrl+A
bind C-a send-prefix

# --- General Settings ---
set -g mouse on                  # Enable mouse support
set -g history-limit 10000       # Increase scrollback buffer
set -g default-terminal "screen-256color"

# --- Split Panes ---
bind | split-window -h           # Horizontal split
bind - split-window -v           # Vertical split

# --- Pane Navigation (Vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Zoom Pane ---
bind 0 resize-pane -Z

# --- Window Management ---
unbind c                   # unbind default new window
bind n new-window          # Create new window
bind d kill-window         # Delete current window

bind i next-window               # Next window
bind u previous-window           # Previous window

# --- Sessions ---
bind s choose-session            # List and switch sessions

# --- Reload Config ---
bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded!"

# --- Key bindings list ---
bind ? list-keys

set-option -g set-clipboard on

